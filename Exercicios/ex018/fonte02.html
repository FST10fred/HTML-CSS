<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
    @font-face {
    font-family: lovefst;
    src: url(fonts/love\ story\ ttf.ttf) format(truetype), url(fonts/love\ story\ ttf.otf) format(opentype);
    /* Tipos de format
    - opentype(otf)
    - truetype(ttf)
    - embedded-opentype
    - truetype-aat(Apple Advanced Typography)
    - svg
    */
    }

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: lovefst, Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Facere beatae quaerat culpa blanditiis eius? Illum vel neque, quibusdam iusto ex minus officiis labore temporibus omnis recusandae error inventore nihil fuga?</p>
</body>
</html>
