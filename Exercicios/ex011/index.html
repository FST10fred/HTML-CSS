<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midia HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Abra esse site em dispositivos diferentes ou aumente e diminua o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="grande">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Bora tocar música</p>
    <!--<audio src="midia/Paradise - Anno Domini Beats.mp3" controls autoplay></audio>-->
    <!-- MP3, WAV, OGG-->

    <audio preload="metadata" controls autoplay loop>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <source src="midia/guanacast-33.wav" type="audio/wav">
        <p>infelizmente seu navegador não consegue reproduzir audio. <a href="midia/guanacast-33.mp3">Clique aqui</a>para baixar o audio</p>
    </audio>
    <audio controls autoplay loop>
         <source src="midia/Paradise - Anno Domini Beats.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
