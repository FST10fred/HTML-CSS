<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
        }

        thead{
            background-color: gray;
            color: white;
        }

        th,td{
            border: 1px solid black;
            padding: 10px;
        }

        .enfeite{
            background-color: gray;
            color: white;
            text-align: left;
        }

        .enfeite1{
            background-color: gray;
            color: white;
        }

        .n{
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2">Área</th>
                <th rowspan="2">Diciplinas</th>
                <th colspan="2">Notas</th>
                <th rowspan="2">Média</th>
            </tr>
            <tr>
                <td>Nota 1</td>
                <td>Nota 2</td>
            </tr>
            
        </thead>
        <tbody>
            <tr>
                <th rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td class="n">7.5</td>
                <td class="n">9.0</td>
                <td class="n">8.5</td>
            </tr>
            <tr>
                <td>Física</td>
                <td class="n">7.5</td>
                <td class="n">9.5</td>
                <td class="n">8.5</td>
            </tr>
            <tr>
                <td>Química</td>
                <td class="n">10.0</td>
                <td class="n">8.5</td>
                <td class="n">9.5</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="n">9.5</td>
                <td class="n">8.5</td>
                <td class="n">9.0</td>
            </tr>
            <tr>
                <th colspan="4" class="enfeite">Média de Exatas</th>
                <th class="enfeite1">9.0</th>
            </tr>
            <tr>
                <th rowspan="2">Humanas</th>
                <td>História</td>
                <td class="n">7.0</td>
                <td class="n">6.5</td>
                <td class="n">7.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td class="n">7.0</td>
                <td class="n">7.5</td>
                <td class="n">7.5</td>
            </tr>
            <tr>
                <th colspan="4" class="enfeite">Média de Humanas</th>
                <th class="enfeite1">7.5</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
